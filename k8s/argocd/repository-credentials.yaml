# Argo CD Repository Credentials
# This file contains the Git repository credentials for Argo CD to sync applications.
#
# The secret should be created with either:
# 1. SSH key: kubectl create secret generic git-repository-ssh -n argocd --from-file=ssh-privatekey=<path-to-key>
# 2. HTTPS PAT: kubectl create secret generic git-repository-https -n argocd --from-literal=username=<user> --from-literal=password=<pat>
#
# Template for SSH key-based authentication:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: git-repository-ssh
#   namespace: argocd
#   labels:
#     argocd.argoproj.io/secret-type: repository
# type: Opaque
# stringData:
#   type: git
#   url: git@github.com:Marvin1912/smart-home-infrastructure.git
#   sshPrivateKey: |
#     -----BEGIN OPENSSH PRIVATE KEY-----
#     [SSH_KEY_CONTENT]
#     -----END OPENSSH PRIVATE KEY-----
#
# Template for HTTPS PAT authentication:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: git-repository-https
#   namespace: argocd
#   labels:
#     argocd.argoproj.io/secret-type: repository
# type: Opaque
# stringData:
#   type: git
#   url: https://github.com/Marvin1912/smart-home-infrastructure.git
#   username: Marvin1912
#   password: [PERSONAL_ACCESS_TOKEN]
