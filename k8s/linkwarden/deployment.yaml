apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwarden
  namespace: default
  labels:
    app: linkwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkwarden
  template:
    metadata:
      labels:
        app: linkwarden
    spec:
      containers:
        - name: linkwarden
          image: linkwarden/linkwarden:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: "jdbc:postgresql://marvin@postgres-service.default.svc.cluster.local:5432/costs?currentSchema=linkwarden"
            - name: POSTGRES_PASSWORD
              value: password
            - name: NEXTAUTH_URL
              value: "http://linkwarden.home-lab.com/api/v1/auth"
            - name: NEXTAUTH_SECRET
              value: password
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: local-mount-linkwarden
