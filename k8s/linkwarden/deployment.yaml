apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwarden
  namespace: default
  labels:
    app: linkwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkwarden
  template:
    metadata:
      labels:
        app: linkwarden
    spec:
      containers:
        - name: linkwarden
          image: ghcr.io/linkwarden/linkwarden:v2.13.5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://marvin:password@postgres-service.default.svc.cluster.local:5432/costs?schema=linkwarden"
            - name: NEXTAUTH_URL
              value: "http://linkwarden.home-lab.com/api/v1/auth"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkwarden-credentials
                  key: NEXTAUTH_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: "256Mi"
            limits:
              cpu: 1000m
              memory: 1500Mi
              ephemeral-storage: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /data/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: local-mount-linkwarden
