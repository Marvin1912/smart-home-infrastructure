apiVersion: v1
kind: Secret
metadata:
  name: linkwarden-secrets
  namespace: linkwarden
  labels:
    app: linkwarden
type: Opaque
stringData:
  postgres-user: linkwarden
  postgres-password: changeme123
  postgres-db: linkwarden
  postgres-host: postgres.linkwarden.svc.cluster.local
  postgres-connection: |
    Host=postgres.linkwarden.svc.cluster.local;Port=5432;Database=linkwarden;Username=linkwarden;Password=changeme123
  linkwarden-masterkey: "CHANGE_THIS_TO_A_SECURE_KEY"
  linkwarden-auth-token: "linkwarden-auth-token-placeholder"
