prometheusDatasource:
  name: Prometheus
  url: http://prometheus-service.default.svc.cluster.local:9090
  access: proxy
  isDefault: true
  type: "prometheus"
  jsonData:
    pdcInjected: false
    tlsSkipVerify: true

grafana:
  user: marvin
  password: password
  cookieSamesite: Lax
  allowEmbedding: true

influxdbDatasource:
  name: InfluxDB
  url: http://influxdb-service.default.svc.cluster.local:8086
  access: proxy
  type: "influxdb"
  isDefault: false
  credentialsSecret:
    name: influxdb-credentials
    key: INFLUX_ADMIN_TOKEN
  jsonData:
    version: Flux
    organization: wildfly_domain
