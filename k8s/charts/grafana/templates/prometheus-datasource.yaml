apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-datasource
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      app: grafana
  datasource:
    name: {{ .Values.prometheusDatasource.name }}
    type: {{ .Values.prometheusDatasource.type }}
    access: {{ .Values.prometheusDatasource.access }}
    url: {{ .Values.prometheusDatasource.url }}
    isDefault: {{ .Values.prometheusDatasource.isDefault }}
    jsonData:
      "pdcInjected": {{ .Values.prometheusDatasource.jsonData.pdcInjected }}
      "tlsSkipVerify": {{ .Values.prometheusDatasource.jsonData.tlsSkipVerify }}
