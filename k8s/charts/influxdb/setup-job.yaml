apiVersion: batch/v1
kind: Job
metadata:
  name: influxdb-setup-job
  namespace: default
  labels:
    app: influxdb-setup
    component: setup-job
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: influxdb-setup
        component: setup-job
    spec:
      restartPolicy: OnFailure
      containers:
      - name: influxdb-setup
        image: bash:5.2.21
        command: ["/bin/sh", "-c"]
        args:
          - |
            apk add --no-cache curl jq &&
            /scripts/setup_influxdb.sh
        env:
        - name: INFLUX_URL
          value: "http://influxdb-service.default.svc.cluster.local:8086"
        - name: INFLUX_ORG
          value: "wildfly_domain"
        - name: INIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: influxdb-credentials
              key: INFLUX_ADMIN_TOKEN
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
            ephemeral-storage: "128Mi"
          limits:
            memory: "256Mi"
            cpu: "200m"
            ephemeral-storage: "512Mi"
        volumeMounts:
        - name: influxdb-setup-script
          mountPath: /scripts/setup_influxdb.sh
          subPath: setup_influxdb.sh
      volumes:
      - name: influxdb-setup-script
        configMap:
          name: influxdb-setup-script
          items:
          - key: setup_influxdb.sh
            path: setup_influxdb.sh
            mode: 0755
