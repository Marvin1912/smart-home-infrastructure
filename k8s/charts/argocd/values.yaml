# ArgoCD Configuration with Resource Limits (Issue #64 - Priority 1)
# Reference: https://github.com/argoproj/argo-cd/releases/v2.10.3

argocdVersion: "2.10.3"

# Server insecure mode for Traefik TLS termination
server:
  insecure: true

# LimitRange applied to the argocd namespace.
# Covers all components (Deployments + StatefulSet) without touching their specs.
# Note: containers that already declare their own resources ignore the LimitRange defaults.
limitRange:
  default:
    cpu: "200m"
    memory: "256Mi"
  defaultRequest:
    cpu: "25m"
    memory: "64Mi"

# Per-component resource limits — kept for documentation and direct kubectl patching.
# These are NOT applied by the Helm chart (patching Deployments owned by install.yaml
# causes SSA field-manager conflicts that strip container args/env/volumeMounts).
# Applied manually via: kubectl patch <kind> <name> -n argocd --type=json -p='[...]'
resources:
  applicationController:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  repoServer:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  server:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  applicationsetController:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  notificationsController:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  dexServer:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  redis:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
