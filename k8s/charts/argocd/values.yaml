# ArgoCD Configuration with Resource Limits (Issue #64 - Priority 1)
# Reference: https://github.com/argoproj/argo-cd/releases/v2.10.3

argocdVersion: "2.10.3"

# Server insecure mode for Traefik TLS termination.
# argocd-cmd-params-cm has server.insecure: true, but the upstream install.yaml
# deployment has no envFrom to wire it up. Apply the flag directly:
#   kubectl patch deployment argocd-server -n argocd --type=json \
#     -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--insecure"}]'
server:
  insecure: true
  disable:
    auth: true

# SSH known-hosts volume for argocd-repo-server.
# SSA field-manager conflicts strip volumes/volumeMounts from the upstream deployment.
# The repo-server needs argocd-ssh-known-hosts-cm mounted to verify GitHub's host key.
# Apply via:
#   kubectl patch deployment argocd-repo-server -n argocd --type=json -p='[
#     {"op":"add","path":"/spec/template/spec/volumes","value":[{"name":"ssh-known-hosts","configMap":{"name":"argocd-ssh-known-hosts-cm"}}]},
#     {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts","value":[{"name":"ssh-known-hosts","mountPath":"/app/config/ssh"}]}
#   ]'

# LimitRange applied to the argocd namespace.
# Covers all components (Deployments + StatefulSet) without touching their specs.
# Note: containers that already declare their own resources ignore the LimitRange defaults.
limitRange:
  default:
    cpu: "200m"
    memory: "256Mi"
  defaultRequest:
    cpu: "25m"
    memory: "64Mi"

# Per-component resource limits — kept for documentation and direct kubectl patching.
# These are NOT applied by the Helm chart (patching Deployments owned by install.yaml
# causes SSA field-manager conflicts that strip container args/env/volumeMounts).
# Applied manually via: kubectl patch <kind> <name> -n argocd --type=json -p='[...]'
resources:
  applicationController:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  repoServer:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  server:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  applicationsetController:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  notificationsController:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  dexServer:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  redis:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
