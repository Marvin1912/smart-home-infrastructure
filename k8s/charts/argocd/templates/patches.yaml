{{- /*
Complete manifests for ArgoCD components with resource limits applied.
All required fields (spec.selector, spec.template.metadata.labels, image) are
included to satisfy Kubernetes schema validation during ArgoCD sync.
Images must match the installed ArgoCD version — update values.yaml when upgrading.
Reference: Issue #64 - Priority 1: Immediate Resource Limits
*/ -}}

---
# Note: spec.selector is intentionally omitted — it is immutable on StatefulSets
# and may not be updated after creation. ServerSideApply=true ensures the existing
# selector set by the original manifest is preserved and not managed here.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-application-controller
    spec:
      containers:
      - name: argocd-application-controller
        image: {{ .Values.images.argocd | quote }}
        resources:
          requests:
            cpu: {{ .Values.resources.applicationController.requests.cpu | quote }}
            memory: {{ .Values.resources.applicationController.requests.memory | quote }}
          limits:
            cpu: {{ .Values.resources.applicationController.limits.cpu | quote }}
            memory: {{ .Values.resources.applicationController.limits.memory | quote }}

