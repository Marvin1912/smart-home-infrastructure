{{- /*
LimitRange for the argocd namespace.
Sets default resource requests/limits for all containers, covering all ArgoCD
components (Deployments and StatefulSets) without touching their specs directly.
This avoids immutable-field conflicts and SSA ownership issues that arise when
patching Deployments that were installed via the official ArgoCD install.yaml.
Reference: Issue #64 - Priority 1: Immediate Resource Limits
*/ -}}

---
apiVersion: v1
kind: LimitRange
metadata:
  name: argocd-resource-limits
  namespace: argocd
spec:
  limits:
  - type: Container
    default:
      cpu: {{ .Values.limitRange.default.cpu | quote }}
      memory: {{ .Values.limitRange.default.memory | quote }}
    defaultRequest:
      cpu: {{ .Values.limitRange.defaultRequest.cpu | quote }}
      memory: {{ .Values.limitRange.defaultRequest.memory | quote }}
