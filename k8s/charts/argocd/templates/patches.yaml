{{- /*
These patches are applied to the ArgoCD components installed via the official manifest.
They add resource limits to prevent OOMKill and enable proper pod eviction policies.
Reference: Issue #64 - Priority 1: Immediate Resource Limits
*/ -}}

---
# Patch: argocd-application-controller-0
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  template:
    spec:
      containers:
      - name: argocd-application-controller
        resources:
          requests:
            cpu: {{ .Values.resources.applicationController.requests.cpu | quote }}
            memory: {{ .Values.resources.applicationController.requests.memory | quote }}
          limits:
            cpu: {{ .Values.resources.applicationController.limits.cpu | quote }}
            memory: {{ .Values.resources.applicationController.limits.memory | quote }}

