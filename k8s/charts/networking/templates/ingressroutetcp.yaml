apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Values.ingressRouteTcp.name }}
  namespace: {{ .Values.ingressRouteTcp.namespace }}
spec:
  entryPoints:
{{- range .Values.ingressRouteTcp.entryPoints }}
    - {{ . }}
{{- end }}
  routes:
    - match: HostSNI(`*`)
      services:
        - name: {{ .Values.ingressRouteTcp.service }}
          port: {{ .Values.ingressRouteTcp.port }}
