apiVersion: v1
kind: Service
metadata:
  name: stock-portfolio-tracker-service
  namespace: default
  labels:
    app: stock-portfolio-tracker-service
spec:
  selector:
    app: stock-portfolio-tracker
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
