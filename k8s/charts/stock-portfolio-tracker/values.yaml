replicaCount: 1

image:
  repository: localhost:5000/stock-portfolio-tracker
  tag: "latest"
  pullPolicy: Always

containerPort: 8000

env:
  appEnv: "production"
  appDebug: "false"
  allowedHosts: '["https://stock.home-lab.com"]'
  databaseUrl: "postgresql+asyncpg://postgres:postgres@postgres-service.default.svc.cluster.local:5432/portfolio"
  schedulerTimezone: "Europe/Berlin"
  monthlyReportCron: "0 8 1 * *"
  stockApiBaseUrl: "https://api.example-stock-provider.com/v1"
  pdfUploadDir: "/tmp/portfolio_uploads"
  pdfMaxUploadBytes: "20971520"

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
    ephemeral-storage: "256Mi"
  limits:
    memory: "512Mi"
    cpu: "250m"
    ephemeral-storage: "512Mi"

service:
  port: 8000
  targetPort: 8000
