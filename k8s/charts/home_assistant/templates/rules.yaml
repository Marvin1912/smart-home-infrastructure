apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: home-assistant-rules
  namespace: default
  labels:
    release: {{ .Values.prometheusRules.releaseLabel }}
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: applications
    meta.helm.sh/release-namespace: default
spec:
  groups:
  - name: battery
    rules:
    - alert: BatteryLow
      expr: homeassistant_sensor_battery_percent <= {{ .Values.battery.alertThreshold }}
      for: 1m
      labels:
        severity: error
      annotations:
        summary: "{{ "$" }}labels.friendly_name is low!"
        description: "{{ "$" }}labels.friendly_name has a value of {{ "$" }}value"
