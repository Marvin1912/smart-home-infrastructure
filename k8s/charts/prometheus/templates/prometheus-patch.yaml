{{- /*
Patch for Prometheus StatefulSet to add resource limits.
This patch is applied to the prometheus-kube-prometheus-stack-prometheus StatefulSet
created by the kube-prometheus-stack Helm chart.
Reference: Issue #64 - Priority 1: Immediate Resource Limits
*/ -}}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus-kube-prometheus-stack-prometheus
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: prometheus
        resources:
          requests:
            cpu: {{ .Values.prometheus.requests.cpu | quote }}
            memory: {{ .Values.prometheus.requests.memory | quote }}
          limits:
            cpu: {{ .Values.prometheus.limits.cpu | quote }}
            memory: {{ .Values.prometheus.limits.memory | quote }}
