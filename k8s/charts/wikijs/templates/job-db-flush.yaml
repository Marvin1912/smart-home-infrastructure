apiVersion: batch/v1
kind: Job
metadata:
  name: wikijs-db-flush
  namespace: default
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-flush
          image: postgres:15.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" <<'EOSQL'
              DO $BLOCK$
              DECLARE
                tbl TEXT;
                content_tables TEXT[] := ARRAY[
                  'pages', 'pageHistory', 'pageLinks', 'pageTags',
                  'tags', 'assets', 'assetFolders', 'comments', 'sessions'
                ];
              BEGIN
                FOREACH tbl IN ARRAY content_tables LOOP
                  IF EXISTS (
                    SELECT 1 FROM pg_tables
                    WHERE schemaname = 'public' AND tablename = tbl
                  ) THEN
                    EXECUTE format('TRUNCATE TABLE %I CASCADE', tbl);
                    RAISE NOTICE 'Truncated: %', tbl;
                  END IF;
                END LOOP;
                -- Fix groups sequence to match WikiJS expected config (start 0, increment 1)
                IF EXISTS (SELECT 1 FROM pg_sequences WHERE sequencename = 'groups_id_seq') THEN
                  ALTER SEQUENCE groups_id_seq MINVALUE 0 START WITH 0 INCREMENT BY 1;
                  PERFORM setval('groups_id_seq', COALESCE((SELECT MAX(id) FROM groups), 0));
                  RAISE NOTICE 'Reset groups_id_seq';
                END IF;
              END $BLOCK$;
              EOSQL
          env:
            - name: DB_HOST
              value: {{ .Values.env.dbHost | quote }}
            - name: DB_PORT
              value: {{ .Values.env.dbPort | quote }}
            - name: DB_USER
              value: {{ .Values.env.dbUser | quote }}
            - name: DB_NAME
              value: {{ .Values.env.dbName | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
