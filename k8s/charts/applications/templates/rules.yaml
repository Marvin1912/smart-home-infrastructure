{{- if .Values.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: application-rules
  namespace: default
  labels:
    release: {{ .Values.prometheusRules.releaseLabel }}
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: applications
    meta.helm.sh/release-namespace: default
spec:
  groups:
  - name: plants
    rules:
    - alert: NeedsWater
      expr: water_plant == 1
      for: 1m
      labels:
        severity: error
      annotations:
        summary: "{{ "$" }}labels.plant needs Water!"
        description: "{{ "$" }}labels.plant must be watered!"
{{- end }}
