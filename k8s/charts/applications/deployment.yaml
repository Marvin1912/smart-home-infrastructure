apiVersion: apps/v1
kind: Deployment
metadata:
  name: applications
  labels:
    app: applications
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: applications
  template:
    metadata:
      labels:
        app: applications
    spec:
      containers:
        - name: applications
          image: localhost:5000/applications:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9055
          env:
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m"
            - name: ADAPTER_PORT
              value: "9055"
            - name: DATA_SOURCE
              value: "jdbc:postgresql://postgres-service.default.svc.cluster.local:5432/costs"
            - name: DATA_SOURCE_USERNAME
              value: "marvin"
            - name: DATA_SOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: applications-credentials
                  key: DATA_SOURCE_PASSWORD
            - name: CAMT_DIRECTORY_IN
              value: "/data/camt"
            - name: CAMT_DIRECTORY_DONE
              value: "/data/camt/done"
            - name: IMPORTER_IN_COSTS
              value: "/data/import/costs"
            - name: IMPORTER_IN_SENSORDATA
              value: "/data/import/sensordata"
            - name: IMPORTER_IN_VOCABULARY
              value: "/data/import/vocabulary"
            - name: IMPORTER_DONE
              value: "/data/import/sensordata/done"
            - name: EXPORTER_FOLDER
              value: "/data/export"
            - name: BACKUP_UPLOAD_ENABLED
              value: "true"
            - name: BACKUP_WATCH_DIR
              value: "/data/backup/in"
            - name: BACKUP_DONE_DIR
              value: "/data/backup/done"
            - name: BACKUP_ERROR_DIR
              value: "/data/backup/error"
            - name: UPLOADER_CREDENTIALS_PATH
              value: "/data/google/credentials.json"
            - name: UPLOADER_COST_EXPORT_FOLDER
              value: "/data/export"
            - name: UPLOADER_ENABLED
              value: "true"
            - name: INFLUX_URL
              value: "http://influxdb-service.default.svc.cluster.local:8086"
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: applications-credentials
                  key: INFLUX_TOKEN
            - name: INFLUX_ORG
              value: "wildfly_domain"
            - name: INFLUXDB_EXPORT_ENABLED
              value: "false"
            - name: CONSUL_URL
              value: "http://192.168.178.29:8500"
            - name: VOCABULARY_DEEPL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepl-api-key 
                  key: VOCABULARY_DEEPL_API_KEY
          resources:
            requests:
              memory: "1500Mi"
              cpu: "750m"
              ephemeral-storage: "512Mi"
            limits:
              memory: "2Gi"
              cpu: "1"
              ephemeral-storage: "2Gi"
          volumeMounts:
          - name: data
            mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: local-mount-pvc
