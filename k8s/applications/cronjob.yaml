apiVersion: batch/v1
kind: CronJob
metadata:
  name: applications-influxdb-backup
  namespace: default
spec:
  schedule: "0 1 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: influxdb-backup
              image: localhost:5000/influxdb-backup:latest
              imagePullPolicy: Always
              command: ["/app/backup/backup.sh"]
              env:
                - name: INFLUX_URL
                  value: "http://influxdb-service.default.svc.cluster.local:8086"
                - name: INFLUX_ORG
                  value: "wildfly_domain"
                - name: INFLUX_TOKEN
                  value: "rmz5aaaKYSpgvXSO3C1UFZmXjvtpwI81b7hcMaMJJqOTjvgI82iNAbSsF7fpGIy2fduNDKACQ759cyaiECrulg=="
                - name: EXCLUDE_BUCKETS
                  value: "sensor_data"
                - name: BACKUP_DIR
                  value: "/data/backup/out"
                - name: PUBLIC_KEY
                  value: "/app/backup/keys/backup_public.pem"
                - name: WATCH_DIR
                  value: "/data/backup/in"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                  ephemeral-storage: "128Mi"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
                  ephemeral-storage: "512Mi"
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: local-mount-pvc
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: applications-db-backup
  namespace: default
spec:
  schedule: "0 2 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: db-backup
              image: localhost:5000/db-backup:latest
              imagePullPolicy: Always
              command: ["/app/backup/backup.sh"]
              env:
                - name: DB_HOST
                  value: "postgres-service.default.svc.cluster.local"
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  value: "costs"
                - name: DB_USER
                  value: "marvin"
                - name: PGPASSWORD
                  value: "password"
                - name: BACKUP_DIR
                  value: "/data/backup/out"
                - name: PUBLIC_KEY
                  value: "/app/backup/keys/backup_public.pem"
                - name: WATCH_DIR
                  value: "/data/backup/in"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                  ephemeral-storage: "128Mi"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
                  ephemeral-storage: "512Mi"
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: local-mount-pvc
