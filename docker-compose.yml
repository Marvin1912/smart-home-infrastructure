services:
  db:
    image: "postgres:15.3"
    container_name: "postgres"
    hostname: "postgres"
    environment:
      POSTGRES_USER: "marvin"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "costs"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    ports:
      - "5435:5432"
    restart: unless-stopped

  consul-server:
    image: hashicorp/consul:1.16
    container_name: consul-server
    volumes:
      - ./consul/server.json:/consul/config/server.json:ro
      - ./consul/certs/:/consul/config/certs/:ro
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    command: "agent -bootstrap-expect=1"
    restart: "unless-stopped"

  consul-client:
    image: hashicorp/consul:1.16
    container_name: consul-client
    volumes:
      - ./consul/client.json:/consul/config/client.json:ro
      - ./consul/certs/:/consul/config/certs/:ro
    command: "agent"
    restart: unless-stopped
  
  registry:
    image: registry:2
    container_name: registry
    ports:
      - "5000:5000"
    restart: unless-stopped

  homeassistant:
    container_name: home_assistant
    image: "ghcr.io/home-assistant/home-assistant:2026.1.3"
    volumes:
      - /opt/home_assistant/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    restart: unless-stopped
    privileged: true
    network_mode: host

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: mosquitto
    hostname: mosquitto
    restart: unless-stopped  
    volumes:
      - /opt/mosquitto:/mosquitto
      - /opt/mosquitto/data:/mosquitto/data
      - /opt/mosquitto/log:/mosquitto/log
    ports:
      - 1885:1883
      - 9005:9001 

  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt:2.7.2
    restart: always
    volumes:
      - /var/lib/zigbee2mqtt-data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - 8085:8080
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      - TZ=Europe/Berlin

volumes:
  postgres_data:
  influxdb_data:
